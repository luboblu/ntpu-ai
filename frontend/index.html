<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI 路由系統</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, "Noto Sans TC", "PingFang TC", sans-serif;
    background: #f7f7f8;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  .header {
    background: white;
    border-bottom: 1px solid #e5e5e5;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .header h1 { font-size: 15px; font-weight: 600; color: #111; }
  .header-right { display: flex; align-items: center; gap: 12px; }

  .meter-wrap { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #999; }
  .meter-bar { width: 72px; height: 4px; border-radius: 2px; background: #eee; overflow: hidden; }
  .meter-fill { height: 100%; background: #7c3aed; transition: width .3s; }
  .meter-fill.hot { background: #e04b2a; }

  .new-btn {
    font-size: 13px; padding: 6px 12px;
    border: 1px solid #ddd; border-radius: 8px;
    background: white; color: #444; cursor: pointer;
  }
  .new-btn:hover { background: #f5f5f5; }

  /* ── Messages ── */
  .messages { flex: 1; overflow-y: auto; padding: 24px 0 8px; }
  .inner { max-width: 720px; margin: 0 auto; padding: 0 20px; }

  .welcome { text-align: center; padding: 80px 20px 40px; color: #888; }
  .welcome h2 { font-size: 22px; font-weight: 600; color: #222; margin-bottom: 8px; }
  .welcome p { font-size: 14px; }

  /* Message row */
  .msg { display: flex; gap: 10px; margin-bottom: 20px; align-items: flex-start; }
  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; flex-shrink: 0; margin-top: 2px;
  }
  .avatar.ai  { background: #7c3aed; color: white; }
  .avatar.user { background: #111; color: white; }

  .msg-body { max-width: 78%; display: flex; flex-direction: column; gap: 4px; }
  .msg.user .msg-body { align-items: flex-end; }

  .bubble {
    padding: 10px 14px; border-radius: 16px;
    font-size: 14px; line-height: 1.7; white-space: pre-wrap; word-break: break-word;
  }
  .msg.ai  .bubble { background: white; border: 1px solid #e5e5e5; border-top-left-radius: 4px; color: #1a1a1a; }
  .msg.user .bubble { background: #7c3aed; color: white; border-top-right-radius: 4px; }

  /* Route meta */
  .meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .badge {
    font-size: 11px; font-weight: 500; padding: 2px 8px;
    border-radius: 999px; border: 1px solid;
  }
  .badge.small { background: #e8f7f1; color: #0f6e56; border-color: #a8dfc8; }
  .badge.large { background: #fdf0ec; color: #b84423; border-color: #f0b9a8; }
  .timing { font-size: 11px; color: #bbb; }

  .judge-toggle {
    font-size: 11px; color: #bbb; background: none;
    border: none; cursor: pointer; padding: 0;
    text-decoration: underline; text-underline-offset: 2px;
  }
  .judge-panel {
    display: none; font-size: 12px; color: #666;
    background: #fafafa; border: 1px solid #eee;
    border-radius: 8px; padding: 8px 12px; line-height: 1.6;
  }
  .judge-panel.open { display: block; }

  /* Typing indicator */
  .dot {
    display: inline-block; width: 6px; height: 6px;
    border-radius: 50%; background: #bbb;
    animation: blink .9s infinite; margin: 0 2px;
  }
  .dot:nth-child(2) { animation-delay: .2s; }
  .dot:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-5px)} }

  /* ── Input ── */
  .input-area {
    flex-shrink: 0;
    padding: 10px 20px 18px;
    background: #f7f7f8;
  }
  .input-wrap {
    max-width: 720px; margin: 0 auto;
    background: white; border: 1px solid #ddd;
    border-radius: 14px; display: flex; align-items: flex-end; gap: 8px;
    padding: 10px 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,.06);
  }
  textarea {
    flex: 1; border: none; outline: none; resize: none;
    font-size: 14px; font-family: inherit; line-height: 1.5;
    max-height: 160px; background: transparent; color: #111;
  }
  textarea::placeholder { color: #aaa; }
  .send-btn {
    width: 32px; height: 32px; border-radius: 8px; border: none;
    background: #7c3aed; color: white; cursor: pointer;
    font-size: 18px; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background .15s;
  }
  .send-btn:hover { background: #6d2fd4; }
  .send-btn:disabled { background: #ccc; cursor: default; }
  .hint { font-size: 11px; color: #ccc; text-align: center; margin-top: 6px; }
</style>
</head>
<body>

<div class="header">
  <h1>AI 路由系統</h1>
  <div class="header-right">
    <div class="meter-wrap">
      難度
      <div class="meter-bar"><div class="meter-fill" id="meterFill" style="width:0%"></div></div>
      <span id="meterVal">0.00</span>
    </div>
    <button class="new-btn" id="resetBtn">＋ 新對話</button>
  </div>
</div>

<div class="messages" id="messages">
  <div class="inner">
    <div class="welcome" id="welcome">
      <h2>有什麼我能幫你的？</h2>
      <p>系統會自動判斷問題難度，路由到 Flash 或 Pro 模型</p>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-wrap">
    <textarea id="input" placeholder="輸入訊息… (Enter 送出，Shift+Enter 換行)" rows="1"></textarea>
    <button class="send-btn" id="sendBtn">↑</button>
  </div>
  <div class="hint">AI 可能出錯，重要內容請自行驗證</div>
</div>

<script>
  const BASE_URL = "https://ntpu-router-158606109353.asia-east1.run.app";

  const sessionId = (() => {
    let id = localStorage.getItem("ai_router_sid");
    if (!id) { id = "s-" + Math.random().toString(36).slice(2, 10); localStorage.setItem("ai_router_sid", id); }
    return id;
  })();

  function updateMeter(v) {
    const pct = Math.min(1, v / 1.6) * 100;
    const f = document.getElementById("meterFill");
    f.style.width = pct + "%";
    f.className = "meter-fill" + (v >= 1 ? " hot" : "");
    document.getElementById("meterVal").textContent = v.toFixed(2);
  }

  function appendMsg(role, text, data) {
    document.getElementById("welcome")?.remove();
    const inner = document.querySelector("#messages .inner");
    const row = document.createElement("div");
    row.className = `msg ${role}`;

    let metaHtml = "";
    if (data) {
      const id = "j" + Date.now();
      const big = data.route === "large";
      metaHtml = `
        <div class="meta">
          <span class="badge ${big ? "large" : "small"}">${big ? "Pro（大模型）" : "Flash（小模型）"}</span>
          <span class="timing">${data.judge_elapsed_ms + data.answer_elapsed_ms} ms</span>
          <button class="judge-toggle" onclick="document.getElementById('${id}').classList.toggle('open')">難度分析 ▾</button>
        </div>
        <div class="judge-panel" id="${id}">
          本次評分 <b>${data.judge.score.toFixed(1)}</b> / 10　任務累積 <b>${data.session_score.toFixed(2)}</b>（≥ 1.0 走 Pro）<br>
          ${data.judge.reason || ""}
        </div>`;
    }

    row.innerHTML = `
      <div class="avatar ${role}">${role === "user" ? "你" : "AI"}</div>
      <div class="msg-body">
        <div class="bubble">${text.replace(/</g, "&lt;")}</div>
        ${metaHtml}
      </div>`;

    inner.appendChild(row);
    row.scrollIntoView({ block: "end", behavior: "smooth" });
  }

  function showTyping() {
    document.getElementById("welcome")?.remove();
    const inner = document.querySelector("#messages .inner");
    const el = document.createElement("div");
    el.className = "msg ai"; el.id = "typing";
    el.innerHTML = `<div class="avatar ai">AI</div><div class="msg-body"><div class="bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div></div>`;
    inner.appendChild(el);
    el.scrollIntoView({ block: "end", behavior: "smooth" });
  }

  document.getElementById("resetBtn").onclick = async () => {
    await fetch(`${BASE_URL}/reset?session_id=${encodeURIComponent(sessionId)}`, { method: "POST" }).catch(() => {});
    updateMeter(0);
    document.querySelector("#messages .inner").innerHTML =
      `<div class="welcome" id="welcome"><h2>有什麼我能幫你的？</h2><p>系統會自動判斷問題難度，路由到 Flash 或 Pro 模型</p></div>`;
  };

  const ta = document.getElementById("input");
  ta.addEventListener("input", () => {
    ta.style.height = "auto";
    ta.style.height = Math.min(ta.scrollHeight, 160) + "px";
  });

  async function send() {
    const text = ta.value.trim();
    if (!text) return;
    const btn = document.getElementById("sendBtn");
    btn.disabled = true;
    ta.value = ""; ta.style.height = "auto";
    appendMsg("user", text);
    showTyping();
    try {
      const res = await fetch(`${BASE_URL}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ session_id: sessionId, message: text }),
      });
      if (!res.ok) throw new Error("伺服器錯誤 " + res.status);
      const d = await res.json();
      document.getElementById("typing")?.remove();
      updateMeter(d.session_score);
      appendMsg("ai", d.answer || "(無回應)", d);
    } catch (e) {
      document.getElementById("typing")?.remove();
      appendMsg("ai", "⚠️ " + e.message);
    } finally {
      btn.disabled = false;
      ta.focus();
    }
  }

  document.getElementById("sendBtn").onclick = send;
  ta.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  });
</script>
</body>
</html>
