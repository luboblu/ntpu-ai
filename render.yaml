services:
  - type: web
    name: ntpu-litellm
    runtime: docker
    dockerfilePath: ./litellm/Dockerfile
    port: 4000
    envVars:
      - key: GEMINI_API_KEY
        sync: false

  - type: web
    name: ntpu-router
    runtime: docker
    dockerfilePath: ./router_backend/Dockerfile
    port: 8000
    envVars:
      - key: LITELLM_BASE_URL
        fromService:
          type: web
          name: ntpu-litellm
          property: url
      - key: LITELLM_MASTER_KEY
        value: sk-1234
      - key: JUDGE_MODEL_ALIAS
        value: judge-model
      - key: SMALL_MODEL_ALIAS
        value: cloud-small
      - key: LARGE_MODEL_ALIAS
        value: cloud-large
